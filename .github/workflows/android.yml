# בונה קובץ התקנה לאנדרואיד (APK) ומפרסם אותו להורדה.
# רץ אוטומטית בכל דחיפה שמשנה את האפליקציה, וגם ידנית (Run workflow).
name: Build Android APK

on:
  push:
    branches: [main, claude/eloquent-wright-vd8qk3]
    paths:
      - "www/**"
      - "android/**"
      - "capacitor.config.json"
      - "package.json"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Install npm dependencies
        run: npm install

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk vienna-for-shlomi.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vienna-for-shlomi-apk
          path: vienna-for-shlomi.apk

      - name: Publish APK to a downloadable release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete android-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create android-latest vienna-for-shlomi.apk \
            --title "וינה לשלומי — אפליקציית אנדרואיד (APK)" \
            --notes "קובץ התקנה לאנדרואיד. הורידו אל הטלפון, פתחו, ואשרו התקנה ממקור לא ידוע. נבנה אוטומטית מהקוד האחרון."
